[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Staging banner on preview deploys only — production uses live forms + Postmark.
[context.deploy-preview.environment]
  VITE_STAGING = "true"

[context.branch-deploy.environment]
  VITE_STAGING = "true"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/careers"
  to = "/.netlify/functions/careers"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[headers]]
  for = "/images/hero/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/menu/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
